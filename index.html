<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio Chinaglia</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="corpo-pagina">
    <header class="header-portifolio container py-2 w-100">

        <h2 class="fs-6">ChinagliaDEV</h2>

        <nav class="navegacao-portifolio p-1">
            <ul class="lista-links">
                <li>Inicio</li>
                <li>Sobre</li>
                <li>Projetos</li>
                <li>Contato</li>
            </ul>
        </nav>

    </header>

    <section class="hero p-4 d-flex align-items-center justify-content-center">

        <div class="hero-bg">
        </div>
        <div class="apresentacao text-white w-100 text-center d-flex flex-column fs-5">
            <h1 class="text-center titulo-apresentacao">Olá, sou Chinaglia</h1>
            <p class="paragrafo-apresentacao text-white">
                Desenvolvedor Full Stack com foco em construir soluções robustas,
                do front-end intuitivo ao back-end eficiente
            </p>
            <div class="botoes-redes-sociais">
                <button class="botoes-linkedin botoes-apresentacao"><i class="bi bi-linkedin"></i></button>
                <button class="botoes-instagram botoes-apresentacao"><i class="bi bi-instagram"></i></button>
            </div>
        </div>


    </section>

    <section class="sessao-tecnologias">
        <h2 class="mt-3 text-center fs-4 fw-bold text-white">TECNOLOGIAS</h2>
        <div class="lista-tecnologias">
            
        </div>
    </section>
    
    <section class="sessao-projetos">
        <h2 class="mt-3 text-center fs-1 fw-bold text-white">PROJETOS</h2>

    </section>
</body>

</html>
